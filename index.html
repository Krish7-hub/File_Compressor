<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Lossless text compression using Huffman coding. Upload any plain-text file, compress it to a compact binary, decompress it back perfectly." />
  <title>huffman.zip — Lossless Compressor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="shell">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-left">
        <span class="logo-mark">HZ</span>
        <div>
          <h1 class="site-name">huffman.zip</h1>
          <p class="site-sub">Lossless text compression</p>
        </div>
      </div>
      <span class="badge">v1.1</span>
    </header>

    <!-- ── Main card ── -->
    <main class="card">

      <!-- Mode tabs -->
      <div class="tabs" role="group" aria-label="Mode">
        <button class="tab active" id="btn-compress" onclick="setMode('compress')">
          <span class="tab-icon">↓</span> Compress
        </button>
        <button class="tab" id="btn-decompress" onclick="setMode('decompress')">
          <span class="tab-icon">↑</span> Decompress
        </button>
      </div>

      <!-- Drop zone -->
      <div class="drop-zone" id="drop-zone" role="button" tabindex="0" aria-label="Drop file or click to browse">
        <input type="file" id="file-input"
          accept=".txt,.csv,.md,.log,.json,.xml,.py,.js,.ts,.html,.css,.java,.c,.cpp,.rs"
          aria-label="Choose file" />
        <div class="drop-body">
          <div class="drop-arrow" aria-hidden="true">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
            </svg>
          </div>
          <p class="drop-headline">Drop your file here</p>
          <p class="drop-hint" id="accepted-hint">.txt .csv .md .log .json .xml .py .js .ts .html .css</p>
        </div>
      </div>

      <!-- File selected -->
      <div class="file-row hidden" id="file-selected">
        <div class="file-ext" id="file-ext-badge">TXT</div>
        <div class="file-meta">
          <span class="file-name" id="file-name-display">—</span>
          <span class="file-size" id="file-size-display">—</span>
        </div>
        <button class="file-remove" onclick="clearFile()" aria-label="Remove file">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Action button -->
      <button class="run-btn" id="action-btn" onclick="run()" disabled>
        <span id="action-label">Compress file</span>
      </button>

    </main>

    <!-- ── Result ── -->
    <div id="result-area"></div>

    <!-- ── Footer ── -->
    <footer class="footer">
      built with <a href="https://en.wikipedia.org/wiki/Huffman_coding" target="_blank" rel="noopener">huffman coding</a>
      &nbsp;·&nbsp; python stdlib &nbsp;·&nbsp; lossless
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
